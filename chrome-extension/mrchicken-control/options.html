<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <title>MrChicken Browser Control</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a0a;
        color: #f4f4f5;
      }

      body {
        width: 360px;
        margin: 0;
        padding: 18px;
        background: #0a0a0a;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 15px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 16px;
        color: #a1a1aa;
        font-size: 12px;
        line-height: 1.45;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 11px;
        font-weight: 700;
        color: #d4d4d8;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #27272a;
        border-radius: 8px;
        padding: 10px;
        background: #111113;
        color: #f4f4f5;
        font-size: 12px;
      }

      button {
        width: 100%;
        margin-top: 14px;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: #ffffff;
        color: #000000;
        font-weight: 800;
        cursor: pointer;
      }

      #status {
        min-height: 16px;
        margin-top: 12px;
        font-size: 12px;
        color: #a7f3d0;
      }
    </style>
  </head>
  <body>
    <h1>MrChicken Browser Control</h1>
    <p>Configure o app local e o mesmo token definido em FLOW_EXTENSION_TOKEN.</p>

    <label for="appUrl">App URL</label>
    <input id="appUrl" autocomplete="off" spellcheck="false" value="http://localhost:3000">

    <label for="token">Token local</label>
    <input id="token" autocomplete="off" spellcheck="false" type="password">

    <button id="save">Salvar</button>
    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
