name: Publicar aplicativo Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar instalador e metadados
        run: npm run desktop:build

      - name: Validar assets de atualização
        run: npm run desktop:verify-release

      - name: Definir versão da release
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=v$version" >> $env:GITHUB_ENV

      - name: Criar rascunho com todos os assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:RELEASE_TAG" `
            "release/MrChicken-Setup-$env:RELEASE_VERSION.exe" `
            "release/MrChicken-Setup-$env:RELEASE_VERSION.exe.blockmap" `
            "release/latest.yml" `
            --repo "$env:GITHUB_REPOSITORY" `
            --target "$env:GITHUB_SHA" `
            --title "MrChicken $env:RELEASE_TAG" `
            --generate-notes `
            --draft

      - name: Publicar somente após upload completo
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$env:RELEASE_TAG" --repo "$env:GITHUB_REPOSITORY" --draft=false
